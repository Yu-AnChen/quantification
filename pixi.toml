[project]
name = "chunkprop"
version = "0.1.0"
description = "Single-cell spatial quantification from multiplexed imaging"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=2.0"
pandas = ">=2.2"
scikit-image = ">=0.24"
tifffile = ">=2024.9"
zarr = ">=3.0"
dask = ">=2024.9"
joblib = ">=1.4"
tqdm = ">=4.66"
h5py = ">=3.11"
imagecodecs = ">=2024.9"
pip = ">=26.0.1,<27"
ruff = ">=0.15.10,<0.16"

[feature.dev.dependencies]
pytest = ">=8.0"
ipykernel = ">=6.0"

[environments]
dev = { features = ["dev"], solve-group = "default" }
